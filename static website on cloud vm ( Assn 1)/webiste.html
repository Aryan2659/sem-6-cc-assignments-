<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TechStore Support Bot</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container{
            width: 420px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .chat-header{
            background-color: #4da6ff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box{
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background-color: #fafafa;
        }

        .message{
            margin: 10px 0;
        }

        .user{
            text-align: right;
            color: blue;
        }

        .bot{
            text-align: left;
            color: green;
        }

        .input-area{
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        input{
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 15px;
            background-color: #4da6ff;
            border: none;
            color: white;
            cursor: pointer;
            margin-left: 5px;
        }

        button:hover{
            background-color: #3399ff;
        }

    </style>
</head>
<body>

    <div class="chat-container">

        <div class="chat-header">
            TechStore Support Bot
        </div>

        <div class="chat-box" id="chatBox">

            <div class="message bot">
                <b>Bot:</b> Hello! Welcome to TechStore Support.<br>
                How can I help you today?
            </div>

        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        function chatbotResponse(userInput){

            userInput = userInput.toLowerCase();

            // Greetings
            if(userInput.includes("hello") || userInput.includes("hi") || userInput.includes("hey")){
                return "Hello! Hope you're having a great day";
            }

            else if(userInput.includes("how are you")){
                return "I'm doing great! Ready to help you.";
            }

            else if(userInput.includes("your name")){
                return "I'm TechStore Support Bot.";
            }

            // Products
            else if(userInput.includes("laptop")){
                return "We have gaming, business, and student laptops available.";
            }

            else if(userInput.includes("phone") || userInput.includes("mobile")){
                return "We offer Samsung, Apple, OnePlus, and Xiaomi smartphones.";
            }

            else if(userInput.includes("headphones")){
                return "We have wired, wireless, and gaming headphones.";
            }

            else if(userInput.includes("price") || userInput.includes("cost")){
                return "Please tell me the product name for pricing details.";
            }

            else if(userInput.includes("discount") || userInput.includes("offer")){
                return "Great news! We currently have up to 30% OFF on electronics.";
            }

            // Orders
            else if(userInput.includes("order")){
                return "Please provide your Order ID to track your order.";
            }

            else if(userInput.includes("track")){
                return "Your order is currently being shipped.";
            }

            else if(userInput.includes("cancel order")){
                return "Your order can be cancelled before shipping.";
            }

            else if(userInput.includes("delivery") || userInput.includes("shipping")){
                return "Delivery usually takes 3-5 business days.";
            }

            // Payments
            else if(userInput.includes("payment")){
                return "We accept UPI, Credit Card, Debit Card, and Net Banking.";
            }

            else if(userInput.includes("cash on delivery") || userInput.includes("cod")){
                return "Yes, Cash on Delivery is available.";
            }

            // Returns & Refunds
            else if(userInput.includes("return")){
                return "Products can be returned within 7 days.";
            }

            else if(userInput.includes("refund")){
                return "Refunds are processed within 5-7 business days.";
            }

            else if(userInput.includes("replace")){
                return "Replacement is available for damaged products.";
            }

            // Support
            else if(userInput.includes("contact") || userInput.includes("support")){
                return "You can contact us at support@techstore.com";
            }

            else if(userInput.includes("location") || userInput.includes("address")){
                return "We are located in Mumbai, India.";
            }

            else if(userInput.includes("timing") || userInput.includes("hours")){
                return "Our store is open from 9 AM to 9 PM.";
            }

            // Thank You
            else if(userInput.includes("thank you") || userInput.includes("thanks")){
                return "You're welcome! 😊";
            }

            // Exit
            else if(userInput.includes("bye") || userInput.includes("exit")){
                return "Thank you for visiting TechStore. Have a nice day!";
            }

            // Default
            else{
                return "Sorry, I didn't understand that. Please try again.";
            }

        }

        function sendMessage(){

            let inputField = document.getElementById("userInput");
            let userMessage = inputField.value.trim();

            if(userMessage === ""){
                return;
            }

            let chatBox = document.getElementById("chatBox");

            // User message
            chatBox.innerHTML += `
                <div class="message user">
                    <b>You:</b> ${userMessage}
                </div>
            `;

            // Bot response
            let botReply = chatbotResponse(userMessage);

            chatBox.innerHTML += `
                <div class="message bot">
                    <b>Bot:</b> ${botReply}
                </div>
            `;

            // Clear input
            inputField.value = "";

            // Auto scroll
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter key support
        document.getElementById("userInput").addEventListener("keypress", function(event){

            if(event.key === "Enter"){
                sendMessage();
            }

        });

    </script>

</body>
</html>
